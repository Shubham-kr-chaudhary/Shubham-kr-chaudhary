<svg width="100%" height="300" viewBox="0 0 1000 300" xmlns="http://www.w3.org/2000/svg">
  <style>
    .b { font: bold 14px 'Courier New', monospace; fill: #10B981; opacity: 0; filter: drop-shadow(0 0 3px #10B981); }
    @keyframes f { 0% { transform: translateY(-30px); opacity: 0; } 5% { opacity: 1; } 95% { opacity: 1; } 100% { transform: translateY(330px); opacity: 0; } }
    
    /* Varies Velocity (Falling Speed) */
    .v0 { animation: f 2s linear infinite; }
    .v1 { animation: f 3.2s linear infinite; }
    .v2 { animation: f 4.5s linear infinite; }
    .v3 { animation: f 5.8s linear infinite; }
    
    /* Varies Delay (Start Time Chaos) */
    .d0 { animation-delay: 0s; }
    .d1 { animation-delay: 1.5s; }
    .d2 { animation-delay: 2.3s; }
    .d3 { animation-delay: 3.8s; }
  </style>

